version: '3.8'

services:
  ddns-updater:
    image: kavehbc/ddns-ip-update
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ZONE_ID=${ZONE_ID}
      - RECORD_ID=${RECORD_ID}
      - API_TOKEN=${API_TOKEN}
      - DOMAIN=${DOMAIN}
      - CRON_INTERVAL=${CRON_INTERVAL} # e.g., "*/5 * * * *" for every 5 minutes
    volumes:
      - ./stored_ip.txt:/app/stored_ip.txt
    restart: always
